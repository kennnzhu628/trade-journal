/**
 * Filter chart/screenshot noise from OCR text.
 * TradingView screenshots produce lots of price-scale numbers
 * that confuse parsing. This keeps signal, removes noise.
 */
function filterChartNoise(ocrText) {
  if (!ocrText) return '';
  const lines = ocrText.split(/[\n\r]+/).map(l => l.trim()).filter(Boolean);
  if (lines.length < 5) return ocrText; // Too short to be a chart screenshot

  const kept = [];

  for (let line of lines) {
    // Skip empty
    if (!line) continue;

    // --- NOISE: Pure number lines (price scale artifacts) ---
    // e.g., "42350.00" or "42,350.00" or "42350"
    if (/^[\d,]+\.?\d{0,4}$/.test(line)) continue;

    // --- NOISE: Lines that are just multiple short numbers (OHLC bars, indicator values) ---
    // e.g., "42350 42380 42320 42360" (O H L C)
    const numbersOnly = line.match(/[\d,.]+/g);
    if (numbersOnly && numbersOnly.length >= 3 && line.replace(/[\d,.\s]+/g, '').length < 3) {
      continue;
    }

    // --- NOISE: Timeframe labels without context ---
    // e.g., "1h 4h 1D 1W 1M" or just "15m"
    if (/^(?:\d+[smhdwM]\s*)+$/.test(line)) continue;

    // --- NOISE: Pure symbol-like short strings without context (candle labels) ---
    // e.g., "M5" "H1" when alone on a line
    if (/^[A-Z]{1,2}\d{1,2}$/.test(line)) continue;

    // --- NOISE: Single digit or very short (OCR artifact) ---
    if (line.length < 2) continue;

    // --- SIGNAL: Lines with trading keywords ---
    if (/(?:buy|sell|long|short|做多|做空|买入|卖出|开仓|平仓|止盈|止损|entry|exit|成交|价格|数量|volume|盈亏|pnl|杠杆|leverage|费|fee)/i.test(line)) {
      kept.push(line);
      continue;
    }

    // --- SIGNAL: Lines with symbol pattern (e.g., BTC/USDT, AAPL) ---
    if (/[A-Z]{2,10}\/[A-Z]{2,10}|[A-Z]{2,8}\s*-\s*[A-Z]{2,8}|[A-Z]{1,6}\.[A-Z]{1,4}/i.test(line)) {
      kept.push(line);
      continue;
    }

    // --- SIGNAL: Lines with currency symbols ---
    if (/[¥$€£₮]\s*\d|USD|USDT|CNY|EUR|GBP/i.test(line)) {
      kept.push(line);
      continue;
    }

    // --- SIGNAL: Lines with +/- and percentage (price change) ---
    if (/[+\-]\s*\d+\.?\d*\s*%/.test(line)) {
      kept.push(line);
      continue;
    }

    // --- AMBIGUOUS: Keep if it has letters mixed with numbers (could be symbol+price) ---
    if (/[A-Za-z].*\d|\d.*[A-Za-z]/.test(line) && line.length > 3) {
      kept.push(line);
      continue;
    }

    // --- AMBIGUOUS: Keep lines with more than 15 chars (likely meaningful text) ---
    if (line.length > 15) {
      kept.push(line);
      continue;
    }

    // --- NOISE: Lines with high ratio of non-ASCII/special chars (garbled OCR from chart graphics) ---
    // Count alphanumeric + common punctuation vs total chars
    const readable = (line.match(/[A-Za-z0-9一-鿿㐀-䶿\s.,%+\-¥$€£₮/()/=:>]+/g) || []).join('').length;
    const ratio = readable / Math.max(line.length, 1);
    if (ratio < 0.35 && line.length > 8) continue; // <35% readable → garbled chart artifact

    // --- NOISE: Lines with box-drawing or special Unicode chart characters ---
    if (/[│─┌┐└┘├┤┬┴┼═║╒╓╔╕╖╗╘╙╚╛╜╝╞╟╠╡╢╣╤╥╦╧╨╩╪╫╬▀▄█▌▐░▒▓■□▪▫●○◆◇▲△►◄]/.test(line)) continue;

    // --- AMBIGUOUS: Keep any line with at least 4 chars that isn't pure whitespace ---
    if (line.length >= 4) {
      kept.push(line);
      continue;
    }

    // Everything else: drop (likely noise)
  }

  // Adaptive: if we filtered out >80% of lines, use light mode (keep more)
  const keptRatio = kept.length / Math.max(lines.length, 1);
  if (keptRatio < 0.2 && lines.length > 10) {
    // Light filter: only remove pure-number lines and very short fragments
    const lightKept = lines.filter(l => {
      if (!l || l.length < 2) return false;
      if (/^[\d,.\s]+$/.test(l) && l.length < 20) return false; // pure numbers only if short
      return true;
    });
    if (lightKept.length > kept.length) {
      return lightKept.join('\n');
    }
  }

  // If we filtered too aggressively and lost everything, return original
  if (kept.length === 0) return ocrText;
  return kept.join('\n');
}

// Fix common OCR number artifacts: misplaced commas, doubled decimals, etc.
function normalizeOCRNumbers(text) {
  if (!text) return text;
  // Fix "63,2000" → "63,200.0" (comma + 4 digits after = decimal artifact)
  // Pattern: digit(s), comma, 3-4 digits that look like a price
  let fixed = text.replace(/\b(\d{1,3}),(\d{3,4})\b/g, function(match, before, after) {
    // "63,2000" → "63200" then re-format
    const num = parseInt(before + after, 10);
    // If this looks like a price near BTC range (~60k), it's likely a valid number with OCR artifact
    if (after.length === 4 && num > 10000) {
      // "63,2000" → "63,200": drop the last digit (OCR artifact)
      return before + ',' + after.slice(0, 3);
    }
    return match;
  });

  // Fix "61.295.3" → "61,295.3" (periods used instead of commas)
  fixed = fixed.replace(/\b(\d{2,3})\.(\d{3})\.(\d)\b/g, '$1,$2.$3');

  // Fix "63200.0" with no comma → add comma for readability
  // (leave as-is, smartParse handles it)

  return fixed;
}

function smartParse(rawText) {
  if (!rawText || !rawText.trim()) return null;
  // Normalize: collapse whitespace, handle OCR artifacts
  let text = rawText.replace(/\s+/g, ' ').trim();
  // Also try line-by-line for structured data
  const lines = rawText.split(/[\n\r]+/).map(l => l.trim()).filter(Boolean);
  const allText = text; // normalized single-line
  const result = {};

  // ====== Symbol detection (with knowledge base) ======
  // Step 1: Try regex patterns to extract a raw symbol from text
  let rawSymbol = null;
  const symbolPatterns = [
    // Crypto pairs with slash: BTC/USDT
    /\b([A-Z]{2,10}\/[A-Z]{2,10})\b/,
    // Forex/crypto with dash: EUR-USD, BTC-USDT
    /\b([A-Z]{2,10}[-][A-Z]{2,10})\b/,
    // Chinese keyword + symbol: 标的 BTC, 代码 AAPL
    /(?:标的|代码|symbol|ticker|合约|名称|品种)[：:\s]*([A-Za-z0-9\/\-]{2,20})/i,
    // OCR-mangled: letters+numbers run together, then "usdt" or "usd" suffix
    /\b([A-Za-z]{2,6}\d{0,2}usdt)\b/i,
    // OCR-mangled: like "cluusdt", "btcu sdt"
    /\b([A-Za-z]{2,10})\s*(usdt|usd|cny|jpy)\b/i,
    // Stock ticker with exchange suffix
    /\b([A-Z]{1,6}\.[A-Z]{1,4})\b/,
    // Chinese stock code (6 digits)
    /\b(\d{6})\b/,
    // Bare uppercase symbol
    /\b([A-Z]{2,8})\b/,
  ];
  for (let p of symbolPatterns) {
    const m = allText.match(p);
    if (m) {
      rawSymbol = m[1].replace(/\s+/g, '');
      if (m[2]) rawSymbol += m[2].toUpperCase(); // Combine if two groups matched
      break;
    }
  }

  // Step 2: Try to find symbol from OCR-mangled text by looking for known patterns
  // e.g., "cluusdt" → should match CL/USDT
  if (!rawSymbol) {
    // Look for any word that might be a mangled symbol
    const wordMatch = allText.match(/\b([A-Za-z]{2,15})\b/);
    if (wordMatch) {
      rawSymbol = wordMatch[1];
    }
  }

  // Step 3: Resolve via knowledge base (fuzzy match + aliases)
  if (rawSymbol) {
    const resolved = resolveInstrument(rawSymbol);
    if (resolved) {
      result.symbol = resolved.symbol;
      result.assetType = resolved.assetType;
      result._instrumentName = resolved.name;
    } else {
      // Fallback: just use the raw symbol as-is, try to normalize
      let cleaned = rawSymbol.toUpperCase().replace(/\s+/g, '');
      // If it ends with USDT/USD/CNY/JPY but has no slash, add one
      const quoteMatch = cleaned.match(/^(.+?)(USDT|USD|CNY|JPY|EUR|GBP|CAD|AUD)$/i);
      if (quoteMatch) {
        result.symbol = quoteMatch[1].toUpperCase() + '/' + quoteMatch[2].toUpperCase();
      } else {
        result.symbol = cleaned;
      }
    }
  }

  // ---- TradingView/Exchange OCR specific patterns ----
  // "BTCUSDT Perpetual Swap Contract - 15 - OKX" or "永续合约"
  const tvContractMatch = allText.match(/(?:Perpetual|永续|交割|当周|次周|季度|合约|Swap|Contract|Futures)/i);
  if (tvContractMatch) {
    result.assetType = 'futures';
    // Screenshots are almost always of active positions → default to open + long
    if (!result.status) result.status = 'open';
    if (!result.direction) result.direction = 'long';
    if (!result.entryDate) result.entryDate = new Date().toISOString().slice(0, 10); // today
    // Try harder: "XXXUSDT" or "XXXUSD" without slash in title
    if (!result.symbol) {
      const tvSym = allText.match(/\b([A-Z]{2,8})(USDT|USD|USDC|BUSD|BTC|ETH)\b/i);
      if (tvSym) {
        result.symbol = tvSym[1].toUpperCase() + '/' + tvSym[2].toUpperCase();
      }
    }
    // Extract timeframe: "15" after dash = 15min
    const tfMatch = allText.match(/[-]\s*(\d+)\s*[-]/);
    if (tfMatch) result._timeframe = tfMatch[1] + 'min';
  }

  // "开 X 高 Y 低 Z 收 W" OHLC pattern
  const ohlcMatch = allText.match(/开\s*([\d,.]+).*?高\s*([\d,.]+).*?低\s*([\d,.]+).*?收\s*([\d,.]+)/);
  if (ohlcMatch) {
    const o = parseFloat(ohlcMatch[1].replace(/,/g, ''));
    const h = parseFloat(ohlcMatch[2].replace(/,/g, ''));
    const l = parseFloat(ohlcMatch[3].replace(/,/g, ''));
    const c = parseFloat(ohlcMatch[4].replace(/,/g, ''));
    if (!isNaN(c)) {
      // The "收" price is the current/reference price
      if (!result.entryPrice) result.entryPrice = c;
      result._ohlc = { open: o, high: h, low: l, close: c };
    }
  }

  // Exchange detection for notes
  const exchangeMatch = allText.match(/\b(OKX|Binance|Bybit|Bitget|HTX|Gate|MEXC|Kucoin|Coinbase|币安|欧易)\b/i);
  if (exchangeMatch) result._exchange = exchangeMatch[1];

  // If we have _exchange or _timeframe, add to notes
  const contextNotes = [];
  if (result._exchange) contextNotes.push('交易所: ' + result._exchange);
  if (result._timeframe) contextNotes.push('周期: ' + result._timeframe);
  if (result._ohlc && !result.entryPrice) {
    contextNotes.push('OHLC 开' + result._ohlc.open + ' 高' + result._ohlc.high + ' 低' + result._ohlc.low + ' 收' + result._ohlc.close);
  }

  // Step 4: Also check for plain Chinese keywords like 原油/黄金/比特币 in OCR text
  if (!result.symbol) {
    for (const [kw, canonical] of Object.entries(KEYWORD_MAP)) {
      if (allText.includes(kw)) {
        result.symbol = canonical;
        result.assetType = INSTRUMENT_KB[canonical].assetType;
        result._instrumentName = INSTRUMENT_KB[canonical].name;
        break;
      }
    }
  }

  // If assetType not set yet, guess from resolved symbol
  if (!result.assetType && result.symbol) {
    const resolved = resolveInstrument(result.symbol);
    if (resolved) {
      result.assetType = resolved.assetType;
      result._instrumentName = resolved.name;
    }
  }

  // ====== Direction detection ======
  const longPatterns = /买入|做多|开多|多单|多仓|看涨|long|buy/i;
  const shortPatterns = /卖出|做空|开空|空单|空仓|看跌|short|sell/i;
  if (longPatterns.test(allText)) result.direction = 'long';
  else if (shortPatterns.test(allText)) result.direction = 'short';

  // ====== Status detection ======
  const closedPatterns = /平仓|已平|已关|出场|止盈|止损|closed|exit|已结|完成/i;
  if (closedPatterns.test(allText)) result.status = 'closed';
  // Default to open if we have any signal that this is a trade (symbol or price found)
  // Screenshots are almost always of active positions
  if (!result.status && (result.symbol || result.entryPrice)) result.status = 'open';
  if (!result.direction) result.direction = 'long'; // default direction

  // ====== P&L detection ======
  // OCR often captures P&L lines like: "盈亏 +750.00" or "+1,234.56" or "-200"
  const pnlPatterns = [
    /(?:盈亏|pnl|p\/l|损益|盈亏金额)[：:\s]*([+\-]?\s*[¥$]?[\d,]+\.?\d*)/i,
    /(?:盈利|亏损)[：:\s]*([+\-]?\s*[¥$]?[\d,]+\.?\d*)/i,
    /([+\-])\s*[¥$]?\s*([\d,]+\.?\d{1,4})(?!\s*(?:价|价格))/,
  ];
  for (let p of pnlPatterns) {
    const m = allText.match(p);
    if (m) {
      const sign = m[1] || '';
      const val = parseFloat((m[2] || m[1] || '0').replace(/[,¥$]/g, ''));
      if (val > 0 && val < 100000000) {
        result._pnlDetected = (sign === '-' ? -val : val);
        break;
      }
    }
  }

  // ====== Price extraction (improved) ======
  // Strategy: find lines/segments with keywords like 价格/入场/成交/price
  const priceKeywords = /(?:价格|成交价|入场价|买入价|卖出价|出场价|开仓价|平仓价|均价|price|entry|exit|open|close|成交)[：:\s]*[¥$]?\s*([\d,]+\.?\d{0,6})/gi;
  let kwPrices = [];
  let pm;
  while ((pm = priceKeywords.exec(rawText)) !== null) {
    kwPrices.push(parseFloat(pm[1].replace(/,/g, '')));
  }

  if (kwPrices.length >= 2) {
    result.entryPrice = kwPrices[0];
    result.exitPrice = kwPrices[kwPrices.length - 1];
  } else if (kwPrices.length === 1) {
    result.entryPrice = kwPrices[0];
  } else {
    // Fallback: extract all numbers that look like prices
    // In TradingView screenshots, the first prominent number near the symbol is the current price;
    // numbers clustered near the bottom are price scale — prefer earlier numbers.
    const allNums = [];
    const numRe = /[¥$]?\s*([\d,]{2,}\.?\d{0,6})/g;
    let nm;
    while ((nm = numRe.exec(allText)) !== null) {
      const val = parseFloat(nm[1].replace(/,/g, ''));
      if (val > 0.5 && val < 100000000) {
        allNums.push({ val: val, pos: nm.index });
      }
    }
    // Sort by position (earlier in text = closer to symbol = more likely the main price)
    allNums.sort((a, b) => a.pos - b.pos);
    const unique = [];
    const seen = new Set();
    for (let n of allNums) {
      const rounded = Math.round(n.val * 100) / 100; // dedupe by 2 decimal places
      if (!seen.has(rounded)) { seen.add(rounded); unique.push(n.val); }
    }
    if (unique.length >= 2) {
      // First = likely current/entry price near symbol
      // Last = likely price scale extreme
      result.entryPrice = unique[0];
      // If the spread is small (<5%), second might be exit; otherwise it's scale
      const spread = Math.abs(unique[1] - unique[0]) / unique[0];
      if (spread < 0.05 && unique.length >= 2) {
        result.exitPrice = unique[1];
      }
    } else if (unique.length === 1) {
      result.entryPrice = unique[0];
    }
  }

  // ====== Quantity extraction (improved) ======
  const qtyPatterns = [
    /(\d+\.?\d*)\s*(?:股|张|份|手|个|枚|张|BTC|ETH|SOL|USDT|lot|share|contract|unit)/i,
    /(?:数量|成交|qty|quantity|volume|手数|张数)[：:\s]*(\d+\.?\d*)/i,
    /(?:x|×)\s*(\d+\.?\d*)/i,
  ];
  for (let p of qtyPatterns) {
    const m = allText.match(p);
    if (m) { result.quantity = parseFloat(m[1]); break; }
  }
  // If still no quantity, look for standalone small decimal numbers (likely qty for crypto)
  if (!result.quantity) {
    const smallNum = allText.match(/\b(\d+\.?\d{1,4})\b/g);
    if (smallNum) {
      const vals = smallNum.map(s => parseFloat(s)).filter(v => v > 0.0001 && v < 10000);
      // Pick the first one that isn't already used as a price
      if (vals.length > 0) {
        const usedPrices = new Set([result.entryPrice, result.exitPrice].filter(Boolean));
        const qtyCandidates = vals.filter(v => !usedPrices.has(v));
        if (qtyCandidates.length > 0) result.quantity = qtyCandidates[0];
      }
    }
  }

  // ====== Date extraction (improved) ======
  const datePatterns = [
    /(\d{4}[-/]\d{1,2}[-/]\d{1,2})/,
    /(\d{1,2}[-/]\d{1,2})\s*(\d{1,2}:\d{1,2})?/,
    /(?:日期|时间|date|time|开仓|平仓)[：:\s]*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i,
    // Chinese date: 2026年06月01日
    /(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/,
  ];
  for (let p of datePatterns) {
    const m = rawText.match(p);
    if (m) {
      let dateStr;
      if (m.length === 4 && m[1] && m[2] && m[3]) {
        // Chinese date format
        dateStr = m[1] + '-' + m[2].padStart(2, '0') + '-' + m[3].padStart(2, '0');
      } else {
        dateStr = m[1].replace(/\//g, '-');
        if (/^\d{1,2}-\d{1,2}$/.test(dateStr)) {
          dateStr = new Date().getFullYear() + '-' + dateStr;
        }
      }
      const d = new Date(dateStr + 'T00:00:00');
      if (!isNaN(d.getTime())) {
        if (!result.entryDate) {
          result.entryDate = dateStr;
        } else {
          // Second date found — might be exit date
          result.exitDate = dateStr;
        }
        // Don't break — keep looking for more dates
      }
    }
  }

  // ====== Fees extraction ======
  const feePatterns = [
    /(?:手续费|佣金|fees?|commission)[：:\s]*[¥$]?\s*([\d,]+\.?\d*)/i,
    /(?:fee)[：:\s]*[¥$]?\s*([\d,]+\.?\d*)/i,
  ];
  for (let p of feePatterns) {
    const m = allText.match(p);
    if (m) { result.fees = parseFloat(m[1].replace(/,/g, '')); break; }
  }

  // ====== Leverage extraction ======
  const levPatterns = [
    /(\d+\.?\d*)\s*[xX倍]/,
    /(?:杠杆|倍数|leverage)[：:\s]*(\d+\.?\d*)/i,
    /(\d+\.?\d*)\s*(?:倍杠杆|x杠杆)/i,
    /\b(\d+)x\b/,
  ];
  for (let p of levPatterns) {
    const m = allText.match(p);
    if (m) { result.leverage = parseFloat(m[1]); break; }
  }

  // ====== Volume extraction ======
  const volPatterns = [
    /(?:成交量|成交额|量|volume|vol)[：:\s\-]*([A-Z]{2,6})?\s*([\d,]+\.?\d*)/i,
    /(\d+\.?\d*)\s*(?:张|手)\b/,
  ];
  for (let p of volPatterns) {
    const m = allText.match(p);
    if (m) {
      const volVal = parseFloat((m[2] || m[1]).replace(/,/g, ''));
      if (volVal > 0 && volVal < 1000000000) { result.volume = volVal; break; }
    }
  }

  // ====== Avg price extraction ======
  const avgPxPatterns = [
    /(?:成交均价|均价|avg.?price|成交平均)[：:\s]*[¥$]?\s*([\d,]+\.?\d*)/i,
  ];
  for (let p of avgPxPatterns) {
    const m = allText.match(p);
    if (m) { result.avgPrice = parseFloat(m[1].replace(/,/g, '')); break; }
  }

  // ====== Currency detection ======
  if (/¥|元|人民币|CNY|RMB/i.test(allText)) result.currency = 'CNY';
  else if (/USDT|usdt|UST/i.test(allText)) result.currency = 'USDT';
  else if (/\$|USD|美元|美金|usd/i.test(allText)) result.currency = 'USD';
  else if (/€|EUR|欧元|eur/i.test(allText)) result.currency = 'EUR';
  else if (/£|GBP|英镑|gbp/i.test(allText)) result.currency = 'GBP';
  else if (/HK\$|HKD|港币|港元|hkd/i.test(allText)) result.currency = 'HKD';
  else if (/JP¥|JPY|日元|jpy/i.test(allText)) result.currency = 'JPY';
  else if (/₩|KRW|韩元|krw/i.test(allText)) result.currency = 'KRW';

  // ====== Manual P&L detection ======
  // Already captured in P&L detection as _pnlDetected, but check for explicit manual marker
  const manPnlMatch = allText.match(/(?:手动盈亏|盈亏|pnl|p\/l)[：:\s]*([+\-]?\s*[¥$]?[\d,]+\.?\d*)/i);
  // Use existing _pnlDetected if not already set

  // ====== Asset type guess ======
  if (result.symbol) {
    if (/\/|-/.test(result.symbol) && /[A-Z]{3,}\/[A-Z]{3,}/.test(result.symbol)) {
      result.assetType = 'crypto';
    } else if (/^\d{6}$/.test(result.symbol)) {
      result.assetType = 'stock';
    } else if (/^[A-Z]{1,5}\.[A-Z]{1,4}$/.test(result.symbol)) {
      result.assetType = 'stock';
    } else if (/^[A-Z]{2,8}$/.test(result.symbol)) {
      result.assetType = 'stock';
    }
  }

  return result;
}

/* ================================================================
   SECTION 8d: OCR (Image Recognition)
   ================================================================ */
let _ocrWorker = null;
let _ocrLoading = false;

async function getOCRWorker() {
  if (_ocrWorker) return _ocrWorker;
  if (_ocrLoading) {
    // Wait for existing load
    let retries = 0;
    while (_ocrLoading && retries < 100) {
      await new Promise(r => setTimeout(r, 200));
      retries++;
    }
    if (_ocrWorker) return _ocrWorker;
  }
  _ocrLoading = true;
  try {
    // Check if Tesseract is loaded (CDN might have failed)
    if (typeof Tesseract === 'undefined') {
      throw new Error('OCR引擎未加载，请检查网络连接后刷新页面');
    }
    const progressEl = document.getElementById('ocr-progress-text');
    if (progressEl) progressEl.textContent = '正在加载识别引擎...';

    try {
      _ocrWorker = await Tesseract.createWorker('chi_sim+eng', 1, {
        logger: function(m) {
          if (m.status === 'recognizing text' && progressEl) {
            const pct = Math.round(m.progress * 100);
            progressEl.textContent = '正在识别文字... ' + pct + '%';
          } else if (progressEl) {
            progressEl.textContent = m.status;
          }
        },
      });
    } catch (e) {
      // Chinese lang pack failed, fall back to English only
      console.warn('chi_sim+eng failed, falling back to eng', e);
      if (progressEl) progressEl.textContent = '中文包加载失败，使用英文识别...';
      _ocrWorker = await Tesseract.createWorker('eng', 1);
    }
    return _ocrWorker;
  } finally {
    _ocrLoading = false;
  }
}

async function performOCR(imageDataUrl) {
  const progressDiv = document.getElementById('ocr-progress');
  const progressText = document.getElementById('ocr-progress-text');
  const resultDiv = document.getElementById('ocr-result-text');

  if (progressDiv) progressDiv.style.display = 'block';
  if (resultDiv) resultDiv.style.display = 'none';
  if (progressText) progressText.textContent = '正在加载识别引擎...';

  try {
    const worker = await getOCRWorker();
    if (!worker) throw new Error('OCR引擎加载失败');

    // --- PASS 1: OCR on original image ---
    if (progressText) progressText.textContent = '正在识别 (原图)...';
    const result1 = await worker.recognize(imageDataUrl);
    const raw1 = (result1.data.text || '').trim();

    // --- PASS 2: OCR on preprocessed image ---
    if (progressText) progressText.textContent = '正在预处理图像...';
    const processed = await preprocessImageForOCR(imageDataUrl);
    if (progressText) progressText.textContent = '正在识别 (增强)...';
    const result2 = await worker.recognize(processed);
    const raw2 = (result2.data.text || '').trim();

    // --- Pick the better result (longer = more text found = better) ---
    let rawText;
    let whichPass;
    if (raw1.length >= raw2.length) {
      rawText = raw1;
      whichPass = '原图';
    } else {
      rawText = raw2;
      whichPass = '增强';
    }

    // If both are very sparse (< 30 chars), maybe Chinese failed, try English-only
    if (rawText.length < 30) {
      if (progressText) progressText.textContent = '尝试英文识别...';
      try {
        const workerEng = await Tesseract.createWorker('eng', 1);
        const resultEng = await workerEng.recognize(imageDataUrl);
        const rawEng = (resultEng.data.text || '').trim();
        await workerEng.terminate();
        if (rawEng.length > rawText.length) {
          rawText = rawEng;
          whichPass = '英文模式';
        }
      } catch (ee) { /* ignore */ }
    }

    // Apply chart noise filter
    const filteredText = filterChartNoise(rawText);
    // Fix OCR-mangled numbers (e.g., "63,2000" → "63,200.0", "61.295.3" → "61,295.3")
    const normalizedText = normalizeOCRNumbers(filteredText || rawText);

    if (progressDiv) progressDiv.style.display = 'none';
    if (resultDiv) {
      resultDiv.style.display = 'block';
      const dropped = rawText.split('\n').length - filteredText.split('\n').length;
      const totalLines = rawText.split('\n').length;
      if (normalizedText && normalizedText.length > 20) {
        resultDiv.textContent = '✅ 识别成功 [' + whichPass + '] (' + dropped + '/' + totalLines + '行噪音已过滤):\n' + normalizedText;
      } else {
        resultDiv.textContent = '⚠️ 识别内容较少 [' + whichPass + ']\n── 过滤后 ──\n' + (normalizedText || '(无)') + '\n── 原始文本（' + rawText.length + '字符）──\n' + (rawText || '(OCR无输出 - 请确认截图清晰度)');
      }
    }
    const effective = (normalizedText && normalizedText.length > 10) ? normalizedText : rawText;
    // Store for toggle button
    const textarea = document.getElementById('smart-paste-input');
    if (textarea) {
      textarea.value = effective;
      textarea.setAttribute('data-raw-text', rawText);
      textarea.setAttribute('data-filtered-text', normalizedText || '');
    }
    const rawBtn = document.getElementById('smart-paste-use-raw');
    if (rawBtn && normalizedText !== rawText && rawText.length > 20) {
      rawBtn.style.display = 'inline-block';
    }
    return effective;
  } catch (e) {
    if (progressDiv) progressDiv.style.display = 'none';
    if (resultDiv) {
      resultDiv.style.display = 'block';
      resultDiv.style.color = '#E53E3E';
      resultDiv.textContent = '❌ 识别失败: ' + e.message;
    }
    return null;
  }
}

function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith('image/')) {
      reject(new Error('请选择图片文件'));
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.onerror = function() { reject(new Error('文件读取失败')); };
    reader.readAsDataURL(file);
  });
}

function handleSmartPasteImage(imageDataUrl) {
  // Show preview
  const preview = document.getElementById('smart-paste-img-preview');
  if (preview) {
    preview.src = imageDataUrl;
    preview.style.display = 'block';
  }

  // Run OCR
  performOCR(imageDataUrl).then(function(text) {
    if (text) {
      // Put recognized text into the textarea
      const textarea = document.getElementById('smart-paste-input');
      if (textarea) {
        textarea.value = text;
      }
      // Auto-parse
      const parsed = smartParse(text);
      if (parsed && Object.keys(parsed).length > 0) {
        fillFormWithParsed(parsed);
        showSmartPasteResult(parsed);
      }
    }
  });
}

// Image compression: resize + convert to JPEG, returns base64 data URL
// Preprocess image for better OCR: boost contrast, grayscale, sharpen
function preprocessImageForOCR(dataUrl) {
  return new Promise(function(resolve) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      // Draw original
      ctx.drawImage(img, 0, 0);
      // Get pixel data
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imageData.data;

      // Convert to grayscale + mild contrast boost
      for (let i = 0; i < pixels.length; i += 4) {
        const gray = 0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2];
        // Mild contrast: 1.3 (was 1.8, too aggressive)
        const contrast = 1.3;
        const midpoint = 128;
        let enhanced = ((gray - midpoint) * contrast) + midpoint;
        enhanced = Math.max(0, Math.min(255, enhanced));
        pixels[i] = pixels[i + 1] = pixels[i + 2] = enhanced;
      }
      ctx.putImageData(imageData, 0, 0);

      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = function() { resolve(dataUrl); };
    img.src = dataUrl;
  });
}

function compressImage(dataUrl, maxW, quality) {
  maxW = maxW || 600;
  quality = quality || 0.5;
  return new Promise(function(resolve) {
    const img = new Image();
    img.onload = function() {
      const w = Math.min(img.width, maxW);
      const h = Math.round(img.height * (w / img.width));
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = function() { resolve(dataUrl); }; // fallback: use original
    img.src = dataUrl;
  });
}

// Render image thumbnails in form
function renderFormImages(images) {
  images = images || [];
  let html = '<div class="img-thumbs" id="form-img-thumbs">';
  for (let i = 0; i < images.length; i++) {
    html += '<div class="img-thumb-wrap" style="width:70px;height:94px;">';
    html += '<img src="' + images[i] + '" alt="截图' + (i + 1) + '" style="width:70px;height:60px;">';
    html += '<span class="img-thumb-remove" data-img-idx="' + i + '">✕</span>';
    html += '<button class="img-ocr-btn" data-img-idx="' + i + '" style="width:100%;height:20px;font-size:10px;background:#3182CE;color:#fff;border:none;border-radius:0 0 4px 4px;cursor:pointer;">🔍识别</button>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// Collect images from form state
function collectFormImages() {
  if (!state._formImages || state._formImages.length === 0) return [];
  return state._formImages;
}

function refreshFormImages() {
  const container = document.getElementById('form-img-thumbs');
  if (!container) return;
  container.outerHTML = renderFormImages(state._formImages || []);
}

function fillFormWithParsed(parsed) {
  if (parsed.symbol) { const el = document.getElementById('fld-symbol'); if (el) el.value = parsed.symbol; }
  if (parsed.direction) {
    const btns = document.querySelectorAll('#fld-direction .segmented-btn');
    btns.forEach(b => { b.classList.toggle('active', b.dataset.val === parsed.direction); });
  }
  if (parsed.status) {
    const btns = document.querySelectorAll('#fld-status .segmented-btn');
    btns.forEach(b => { b.classList.toggle('active', b.dataset.val === parsed.status); });
    const isOpen = parsed.status === 'open';
    const condExit = document.getElementById('cond-exitPrice');
    const condMark = document.getElementById('cond-markPrice');
    const condLoss = document.getElementById('cond-lossReason');
    if (condExit) condExit.classList.toggle('show', !isOpen);
    if (condMark) condMark.classList.toggle('show', isOpen);
    if (condLoss) condLoss.classList.toggle('show', !isOpen);
  }
  if (parsed.assetType) {
    const btns = document.querySelectorAll('#fld-assetType .segmented-btn');
    btns.forEach(b => { b.classList.toggle('active', b.dataset.val === parsed.assetType); });
  }
  if (parsed.entryPrice != null) { const el = document.getElementById('fld-entryPrice'); if (el) el.value = parsed.entryPrice; }
  if (parsed.exitPrice != null) { const el = document.getElementById('fld-exitPrice'); if (el) el.value = parsed.exitPrice; }
  if (parsed.quantity != null) { const el = document.getElementById('fld-quantity'); if (el) el.value = parsed.quantity; }
  if (parsed.entryDate) { const el = document.getElementById('fld-entryDate'); if (el) el.value = parsed.entryDate; }
  if (parsed.fees != null) { const el = document.getElementById('fld-fees'); if (el) el.value = parsed.fees; }
  if (parsed.leverage != null) { const el = document.getElementById('fld-leverage'); if (el) el.value = parsed.leverage; }
  if (parsed.volume != null) { const el = document.getElementById('fld-volume'); if (el) el.value = parsed.volume; }
  if (parsed.avgPrice != null) { const el = document.getElementById('fld-avgPrice'); if (el) el.value = parsed.avgPrice; }
  if (parsed.currency) { const el = document.getElementById('fld-currency'); if (el) el.value = parsed.currency; }
  if (parsed.manualPnL != null) { const el = document.getElementById('fld-manualPnL'); if (el) el.value = parsed.manualPnL; }
}

function showSmartPasteResult(parsed) {
  const resultEl = document.getElementById('smart-paste-result');
  if (!resultEl) return;
  const filled = [];
  if (parsed.symbol) {
    const label = parsed._instrumentName ? parsed.symbol + '（' + parsed._instrumentName + '）' : parsed.symbol;
    filled.push('标的: ' + label);
  }
  if (parsed.direction) filled.push('方向: ' + (parsed.direction === 'long' ? '做多' : '做空'));
  if (parsed.entryPrice) filled.push('入场价: ' + formatCurrency(parsed.entryPrice));
  if (parsed.exitPrice) filled.push('出场价: ' + formatCurrency(parsed.exitPrice));
  if (parsed.quantity) filled.push('数量: ' + parsed.quantity);
  if (parsed.entryDate) filled.push('日期: ' + parsed.entryDate);
  if (parsed.leverage) filled.push('倍数: ' + parsed.leverage + 'x');
  if (parsed.volume) filled.push('成交量: ' + parsed.volume);
  if (parsed.avgPrice) filled.push('成交均价: ' + formatCurrency(parsed.avgPrice));
  if (parsed._pnlDetected) {
    const cls = parsed._pnlDetected > 0 ? 'text-profit' : 'text-loss';
    filled.push('盈亏: <span class="' + cls + '">' + formatCurrency(parsed._pnlDetected) + '</span>');
  }
  // TradingView context
  const ctx = [];
  if (parsed._exchange) ctx.push('🏦' + parsed._exchange);
  if (parsed._timeframe) ctx.push('⏱' + parsed._timeframe);
  if (parsed._ohlc) ctx.push('📊开' + parsed._ohlc.open + ' 收' + parsed._ohlc.close);

  if (filled.length > 0 || ctx.length > 0) {
    let msg = (filled.length > 0 ? '✅ 已识别: ' + filled.join('，') : '');
    if (ctx.length > 0) msg += (msg ? '<br>' : '') + ctx.join(' · ');
    msg += '<br><span style="color:var(--color-text-muted);">字段非必填，可留空直接保存</span>';
    resultEl.innerHTML = msg;
  } else {
    resultEl.textContent = '未能识别交易信息，请手动填写';
  }
}

    closeCopyDialog();
    refreshState();
    render();
    showToast('笔记已保存 ✓');
  });

  // Smart paste (handled via body delegation since form is dynamically rendered)
  document.body.addEventListener('click', function(e) {
    // Smart paste toggle
    if (e.target.closest('#smart-paste-toggle')) {
      const section = document.getElementById('smart-paste-section');
      if (section) section.classList.toggle('show');
      return;
    }
    // Smart paste tab: text
    if (e.target.closest('#smart-paste-text-tab')) {
      document.getElementById('smart-paste-text-panel').style.display = 'block';
      document.getElementById('smart-paste-img-panel').style.display = 'none';
      document.getElementById('smart-paste-text-tab').classList.add('active');
      document.getElementById('smart-paste-img-tab').classList.remove('active');
      return;
    }
    // Smart paste tab: image
    if (e.target.closest('#smart-paste-img-tab')) {
      document.getElementById('smart-paste-text-panel').style.display = 'none';
      document.getElementById('smart-paste-img-panel').style.display = 'block';
      document.getElementById('smart-paste-img-tab').classList.add('active');
      document.getElementById('smart-paste-text-tab').classList.remove('active');
      return;
    }
    // Image drop zone click → open file picker
    if (e.target.closest('#smart-paste-img-drop')) {
      document.getElementById('smart-paste-file-input').click();
      return;
    }
    // Smart paste: parse (from textarea or OCR result)
    if (e.target.closest('#smart-paste-parse')) {
      const input = document.getElementById('smart-paste-input');
      const resultEl = document.getElementById('smart-paste-result');
      if (!input || !input.value.trim()) {
        if (resultEl) resultEl.textContent = '请先粘贴交易信息或上传截图';
        return;
      }
      const parsed = smartParse(input.value);
      if (!parsed || Object.keys(parsed).length === 0) {
        if (resultEl) resultEl.textContent = '未能识别交易信息，请手动填写或调整粘贴内容';
        return;
      }
      fillFormWithParsed(parsed);
      showSmartPasteResult(parsed);
      return;
    }
    // Smart paste: clear
    if (e.target.closest('#smart-paste-clear')) {
      const input = document.getElementById('smart-paste-input');
      const resultEl = document.getElementById('smart-paste-result');
      const preview = document.getElementById('smart-paste-img-preview');
      const ocrResult = document.getElementById('ocr-result-text');
      const rawBtn = document.getElementById('smart-paste-use-raw');
      if (input) { input.value = ''; input.removeAttribute('data-raw-text'); input.removeAttribute('data-filtered-text'); }
      if (resultEl) resultEl.textContent = '';
      if (preview) { preview.src = ''; preview.style.display = 'none'; }
      if (ocrResult) { ocrResult.style.display = 'none'; ocrResult.textContent = ''; }
      if (rawBtn) rawBtn.style.display = 'none';
      return;
    }
    // Smart paste: use raw OCR text (toggle between filtered and raw)
    if (e.target.closest('#smart-paste-use-raw')) {
      const input = document.getElementById('smart-paste-input');
      const btn = document.getElementById('smart-paste-use-raw');
      if (!input) return;
      const raw = input.getAttribute('data-raw-text') || '';
      const filtered = input.getAttribute('data-filtered-text') || '';
      if (input.value === filtered && raw) {
        // Currently using filtered, switch to raw
        input.value = raw;
        if (btn) btn.textContent = '🔄过滤';
        showToast('已切换为原始OCR文本');
      } else if (raw) {
        // Currently using raw, switch back to filtered
        input.value = filtered || raw;
        if (btn) btn.textContent = '🔄原始';
        showToast('已切换为过滤后文本');
      }
      // Re-parse with new text
      const parsed = smartParse(input.value);
      if (parsed && Object.keys(parsed).length > 1) {
        fillFormWithParsed(parsed);
        showSmartPasteResult(parsed);
      }
      return;
    }
    // Form image: drop zone click → open file picker
    if (e.target.closest('#form-img-drop')) {
      const fileInput = document.getElementById('form-img-file-input');
      if (fileInput) fileInput.click();
      return;
    }
    // Form image: remove thumbnail
    if (e.target.closest('.img-thumb-remove')) {
      const idx = parseInt(e.target.dataset.imgIdx);
      if (!isNaN(idx) && state._formImages) {
        state._formImages.splice(idx, 1);
        refreshFormImages();
      }
      return;
    }
    // Form image: OCR this image to fill/correct form fields
    if (e.target.closest('.img-ocr-btn')) {
      const idx = parseInt(e.target.dataset.imgIdx);
      if (!isNaN(idx) && state._formImages && state._formImages[idx]) {
        const imgDataUrl = state._formImages[idx];
        // Show smart paste section for progress feedback
        const section = document.getElementById('smart-paste-section');
        if (section) section.classList.add('show');
        // Switch to text tab to show result
        const textPanel = document.getElementById('smart-paste-text-panel');
        const imgPanel = document.getElementById('smart-paste-img-panel');
        if (textPanel) textPanel.style.display = 'block';
        if (imgPanel) imgPanel.style.display = 'none';

        performOCR(imgDataUrl).then(function(text) {
          if (text) {
            const textarea = document.getElementById('smart-paste-input');
            if (textarea) textarea.value = text;
            const parsed = smartParse(text);
            if (parsed && Object.keys(parsed).length > 0) {
              fillFormWithParsed(parsed);
              showSmartPasteResult(parsed);
              showToast('已识别并更新字段 ✓');
            } else {
              showToast('识别完成，未能解析交易信息');
            }
          }
        });
      }
      return;
    }
  });

  // Form image file input: handle selection (body delegation)
  document.body.addEventListener('change', function(e) {
    if (e.target.id === 'form-img-file-input') {
      if (e.target.files && e.target.files[0]) {
        loadImageFromFile(e.target.files[0]).then(function(dataUrl) {
          return compressImage(dataUrl);
        }).then(function(compressed) {
          if (!state._formImages) state._formImages = [];
          state._formImages.push(compressed);
          refreshFormImages();
        }).catch(function(err) {
          showToast('图片加载失败: ' + err.message);
        });
        e.target.value = '';
      }
    }
  });

  // File input: handle smart paste screenshot selection (body delegation since element is dynamically rendered)
  document.body.addEventListener('change', function(e) {
    if (e.target.id === 'smart-paste-file-input') {
      if (e.target.files && e.target.files[0]) {
        loadImageFromFile(e.target.files[0]).then(function(dataUrl) {
          handleSmartPasteImage(dataUrl);
        }).catch(function(err) {
          const resultEl = document.getElementById('smart-paste-result');
          if (resultEl) resultEl.textContent = '❌ ' + err.message;
        });
        e.target.value = '';
      }
    }
  });

  // Paste event: handle image paste (Ctrl+V) on the entire document
  document.addEventListener('paste', function(e) {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;

    // Check if trade form modal is open → add image to form attachments
    const modalOpen = document.getElementById('modal-overlay').classList.contains('open');
    const smartSection = document.getElementById('smart-paste-section');
    const smartVisible = smartSection && smartSection.classList.contains('show');

    for (let item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();

        if (smartVisible) {
          // Smart paste mode: OCR the image
          loadImageFromFile(blob).then(function(dataUrl) {
            const textPanel = document.getElementById('smart-paste-text-panel');
            const imgPanel = document.getElementById('smart-paste-img-panel');
            const textTab = document.getElementById('smart-paste-text-tab');
            const imgTab = document.getElementById('smart-paste-img-tab');

            if (imgPanel) imgPanel.style.display = 'block';

            if (imgTab) imgTab.classList.add('active');

          }).catch(function(err) {
            const resultEl = document.getElementById('smart-paste-result');
            if (resultEl) resultEl.textContent = '❌ ' + err.message;
          });
        } else if (modalOpen) {
          // Trade form mode: add image as attachment
          loadImageFromFile(blob).then(function(dataUrl) {
            return compressImage(dataUrl);
          }).then(function(compressed) {
            if (!state._formImages) state._formImages = [];
            state._formImages.push(compressed);
            refreshFormImages();
            showToast('截图已添加 ✓');
          }).catch(function(err) {
            showToast('图片加载失败');
          });

      }

  document.getElementById('main-content').addEventListener('click', function(e) {

      if (trade) openModal(trade);
      return;
    }

    const delBtn = e.target.closest('.btn-delete');

      const id = delBtn.dataset.id;
      const trade = state.trades.find(t => t.id === id);
      const name = trade ? trade.symbol : '未知';
      showConfirm('确认删除交易「' + name + '」？\n此操作不可恢复。', function() {
        deleteTrade(id);
        refreshState();
        render();
        showToast('已删除 ✓');

    }
    // Filter chips
    const chip = e.target.closest('.filter-chip');
    if (chip && chip.dataset.filter) {
      const filterKey = chip.dataset.filter;
      const filterVal = chip.dataset.val;
      state.filters[filterKey] = filterVal;

    }

    const periodChip = e.target.closest('[data-period]');
    if (periodChip) {
      document.querySelectorAll('[data-period]').forEach(c => c.classList.remove('active'));
      periodChip.classList.add('active');
      // Re-render stats with period filter
      applyPeriodFilter(periodChip.dataset.period);
      drawCharts();
      return;
    }

  // Search input (debounced)
  document.getElementById('main-content').addEventListener('input', debounce(function(e) {
    if (e.target.id === 'search-input') {
      state.filters.search = e.target.value;
      render();
    }
  }, 250));

  // Sort select
  document.getElementById('main-content').addEventListener('change', function(e) {
    if (e.target.id === 'sort-select') {
      state.filters.sort = e.target.value;
      render();
    }
    // Mark price change in positions
    if (e.target.classList.contains('mark-input')) {

      const val = parseFloat(e.target.value);
      updateTrade(id, { markPrice: isNaN(val) ? null : val });

  // Settings: body-level event delegation (always attached, regardless of active tab)
  document.body.addEventListener('click', function(e) {
    const schemeBtn = e.target.closest('#color-scheme-toggle .segmented-btn');
    if (schemeBtn) {
      const scheme = schemeBtn.dataset.scheme;
      state.settings.colorScheme = scheme;
      saveSettings(state.settings);
      applyColorScheme();
      refreshState();
      render();
      showToast(scheme === 'chinese' ? '已切换为红涨绿跌' : '已切换为红跌绿涨');
      return;
    }

    // Default currency change
    if (e.target.id === 'default-currency') {
      state.settings.defaultCurrency = e.target.value;
      saveSettings(state.settings);
      showToast('默认货币已设为 ' + (CURRENCIES[e.target.value]?.name || e.target.value));
      return;
    }

    // Export
    if (e.target.closest('#btn-export')) {
      exportCSV();
      return;
    }
    // Import
    if (e.target.closest('#btn-import')) {
      document.getElementById('csv-file-input').click();
      return;
    }
    // Copy all data
    if (e.target.closest('#btn-copy-data')) {
      copyAllDataToClipboard();
      return;
    }
    // Paste import
    if (e.target.closest('#btn-paste-import')) {
      showPasteImportDialog();

    // Clear data
    if (e.target.closest('#btn-clear')) {
      showConfirm('确认清除所有交易记录？\n此操作不可恢复！', function() {

function applyPeriodFilter(period) {
  if (period === 'all') {
    // Default already uses all closed trades
    return;
  }
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  // Filter the chart data and rebuild stats
  const closed = state.trades.filter(t => t.status === 'closed');
  let filtered;
  if (period === 'this-month') {
    filtered = closed.filter(t => {
      if (!t.exitDate) return false;
      const d = new Date(t.exitDate + 'T00:00:00');
      return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
    });
  } else if (period === 'this-year') {
    filtered = closed.filter(t => {
      if (!t.exitDate) return false;
      const d = new Date(t.exitDate + 'T00:00:00');
      return d.getFullYear() === thisYear;
    });
  } else {
    filtered = closed;
  }

  // Update KPI cards
  const total = filtered.length;
  const wins = filtered.filter(t => (getTradePnL(t) || 0) > 0);
  const losses = filtered.filter(t => (getTradePnL(t) || 0) < 0);
  const winRate = total > 0 ? (wins.length / total * 100) : 0;
  const totalPnL = filtered.reduce((s, t) => s + (getTradePnL(t) || 0), 0);
  const avgWin = wins.length > 0 ? wins.reduce((s, t) => s + (getTradePnL(t) || 0), 0) / wins.length : 0;
  const avgLoss = losses.length > 0 ? losses.reduce((s, t) => s + (getTradePnL(t) || 0), 0) / losses.length : 0;
  const profitFactor = Math.abs(avgLoss) > 0 ? Math.abs(avgWin / avgLoss) : 0;

  const kpiVals = document.querySelectorAll('.kpi-val');
  if (kpiVals.length >= 4) {
    kpiVals[0].textContent = total;
    kpiVals[1].textContent = winRate.toFixed(1) + '%';
    const pnlCls = totalPnL > 0 ? 'text-profit' : (totalPnL < 0 ? 'text-loss' : '');
    kpiVals[2].className = 'kpi-val ' + pnlCls;
    kpiVals[2].textContent = formatCurrency(totalPnL);
    kpiVals[3].textContent = profitFactor > 0 ? profitFactor.toFixed(2) : '--';
  }
  const kpiSubs = document.querySelectorAll('.kpi-sub');
  if (kpiSubs.length >= 2) {
    kpiSubs[0].textContent = '盈' + wins.length + ' / 亏' + losses.length;
    kpiSubs[1].textContent = '均盈' + formatCurrency(avgWin) + ' / 均亏' + formatCurrency(avgLoss);
  }
}

/* ================================================================
   SECTION 10: PWA Setup
   ================================================================ */
function setupPWA() {
  // Generate proper PNG icon via Canvas (Android requires PNG, not SVG)
  function generateIcon(size) {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    // Background
    const gradient = ctx.createLinearGradient(0, 0, size, size);
    gradient.addColorStop(0, '#3182CE');
    gradient.addColorStop(1, '#2B6CB0');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.18);
    ctx.fill();
    // Icon: a simple chart/candlestick
    const cx = size / 2, cy = size / 2;
    const barW = size * 0.08;
    // Candle 1 (green/up)
    ctx.fillStyle = '#68D391';
    ctx.fillRect(cx - size * 0.22, cy + size * 0.05, barW, size * 0.18);
    ctx.fillRect(cx - size * 0.22 + barW/2 - 1, cy - size * 0.05, 2, size * 0.28);
    // Candle 2 (red/down)
    ctx.fillStyle = '#FC8181';
    ctx.fillRect(cx + size * 0.02, cy - size * 0.08, barW, size * 0.14);
    ctx.fillRect(cx + size * 0.02 + barW/2 - 1, cy - size * 0.18, 2, size * 0.24);
    // Candle 3 (green/up)
    ctx.fillStyle = '#68D391';
    ctx.fillRect(cx + size * 0.22, cy - size * 0.02, barW, size * 0.2);
    ctx.fillRect(cx + size * 0.22 + barW/2 - 1, cy - size * 0.14, 2, size * 0.32);
    // Trend line
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = size * 0.03;
    ctx.beginPath();
    ctx.moveTo(cx - size * 0.26, cy + size * 0.12);
    ctx.lineTo(cx - size * 0.02, cy - size * 0.05);
    ctx.lineTo(cx + size * 0.26, cy - size * 0.01);
    ctx.stroke();

    return canvas.toDataURL('image/png');
  }

  const icon192 = generateIcon(192);
  const icon512 = generateIcon(512);

  const manifest = {
    name: '交易日志',
    short_name: '交易日志',
    description: '个人交易记录管理 - 支持多币种/股票/加密货币/期货',
    start_url: '.',
    display: 'standalone',
    background_color: '#F7FAFC',
    theme_color: '#1A202C',
    orientation: 'portrait',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
    ],
  };

  // Use Blob URL for manifest (avoids deprecated unescape)
  const manifestStr = JSON.stringify(manifest);
  const manifestBlob = new Blob([manifestStr], { type: 'application/json' });
  const manifestUrl = URL.createObjectURL(manifestBlob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestUrl;
  document.head.appendChild(link);

  // Service Worker (via Blob)
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'trade-journal-v1';
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(c => c.addAll(['.']))
        );
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request))
        );
      });
    `;
    try {
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {
        // Blob SW may not work on file:// — that's okay
      });
    } catch (e) {
      // Service worker not supported or blocked
    }
  }

  // Install prompt
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    window._deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (banner) banner.classList.add('show');
  });

  // Detect standalone mode
  if (window.matchMedia('(display-mode: standalone)').matches) {
    const banner = document.getElementById('install-banner');
    if (banner) banner.classList.remove('show');
  }
}

/* ================================================================
   SECTION 11: Storage event for cross-tab sync
   ================================================================ */
window.addEventListener('storage', function(e) {
  if (e.key === STORAGE_KEY_TRADES || e.key === STORAGE_KEY_SETTINGS) {
    refreshState();
    render();
  }
});

/* ================================================================
   SECTION 12: Initialization
   ================================================================ */
function init() {
  refreshState();
  render();
  setupEvents();
  setupPWA();
}

document.addEventListener('DOMContentLoaded', init);
</script>
